server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: crop-disease-monitor

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/agriculture_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: agri
    password: agri_pwd_2026

  # Redis 配置 (验证码/限流/缓存)
  data:
    redis:
      host: localhost
      port: 6379
      password: agri_redis_2026
      database: 0

  # RabbitMQ 配置 (灾情削峰/异步通知)
  rabbitmq:
    host: localhost
    port: 5672
    username: agri
    password: agri_mq_2026
    virtual-host: /agri

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  # JSON配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # 邮件配置 (QQ邮箱SMTP)
  mail:
    host: smtp.qq.com
    port: 465
    username: 2043412933@qq.com
    password: ltganhpowgjbdgdj
    properties:
      mail:
        smtp:
          ssl:
            enable: true

# MyBatis-Plus配置
mybatis-plus:
  # mapper XML 文件按模块存放在 mapper/<module>/ 目录下
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.agriculture.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.agriculture: debug
    com.agriculture.dao: debug

# Knife4j接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# ElasticSearch 配置 (历史病虫害日志检索)
spring.elasticsearch.uris: http://localhost:9200

# MinIO 对象存储配置 (图片/报告文件)
minio:
  endpoint: http://localhost:9000
  access-key: agri_minio_admin
  secret-key: agri_minio_2026
  bucket-name: agri-monitor

# JWT配置
jwt:
  secret: agriculture-secret-key-2026-very-long-and-secure
  expiration: 86400

# 文件存储路径
file:
  upload-path: ./uploads/images/
  allowed-types: image/jpeg,image/png,image/jpg

# Python推理服务配置
inference:
  service-url: http://localhost:8000
  default-confidence: 0.5
  connect-timeout: 5000
  read-timeout: 30000

# LLM 大语言模型配置 (农业大脑)
llm:
  api-key: ${LLM_API_KEY:tp-cwsdktlrguhngoaf0gphv9n0w2te0c876wc9hirux3lhimu2}
  base-url: ${LLM_BASE_URL:https://token-plan-cn.xiaomimimo.com}
  model: ${LLM_MODEL:mimo-v2.5-pro}
  connect-timeout: 5000
  read-timeout: 60000
  max-history-messages: 20

# RTSP抽帧配置
capture:
  save-path: ./captures
  timeout-ms: 10000
  transport: tcp

# HLS视频流配置
hls:
  output-path: ./hls
  segment-time: 4
  list-size: 5
