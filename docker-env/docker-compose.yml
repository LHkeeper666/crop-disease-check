version: "3.8"

# ============================================================
# 农作物疾病监测系统 - Docker Compose 编排
# 技术栈参考: docs/迭代一内容/技术选型.md
# ============================================================

services:

  # ----------------------------------------------------------
  # MySQL 8.0 - 关系型数据库
  # 存储: 用户权限表、设备机位表、智能工单表等
  # ----------------------------------------------------------
  mysql:
    profiles: [infra]
    image: mysql:8.0
    container_name: agri-monitor-mysql
    runtime: runc
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-agri_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agriculture_db}
      MYSQL_USER: ${MYSQL_USER:-agri}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-agri_pwd_2026}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/sql:/docker-entrypoint-initdb.d
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    networks:
      - agri-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-agri_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis 7.0 - 缓存数据库
  # 用途: 邮箱验证码(5分钟时效)、滑动窗口限流、JWT Token 缓存
  # ----------------------------------------------------------
  redis:
    profiles: [infra]
    image: redis:7-alpine
    container_name: agri-monitor-redis
    runtime: runc
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-agri_redis_2026} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - agri-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-agri_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # RabbitMQ 3.12+ - 消息队列
  # 用途: 突发灾情削峰、异步通知、YOLOv8 推理任务分发
  # ----------------------------------------------------------
  rabbitmq:
    profiles: [infra]
    image: rabbitmq:3.12-management-alpine
    container_name: agri-monitor-rabbitmq
    runtime: runc
    restart: always
    ports:
      - "5672:5672"       # AMQP 协议端口
      - "15672:15672"     # 管理控制台
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-agri}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-agri_mq_2026}
      RABBITMQ_DEFAULT_VHOST: /agri
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - agri-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ----------------------------------------------------------
  # ElasticSearch 8.x - 全文检索引擎
  # 用途: 海量历史病虫害日志、设备报警检索
  # ----------------------------------------------------------
  elasticsearch:
    profiles: [infra]
    image: elasticsearch:8.13.0
    container_name: agri-monitor-es
    runtime: runc
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=agri-monitor-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - agri-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ----------------------------------------------------------
  # MinIO - 对象存储
  # 用途: 突发灾情现场高清截屏、历史 HTML 简报存储
  # ----------------------------------------------------------
  minio:
    profiles: [infra]
    image: minio/minio:latest
    container_name: agri-monitor-minio
    runtime: runc
    restart: always
    ports:
      - "9000:9000"       # S3 API
      - "9001:9001"       # 管理控制台
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agri_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agri_minio_2026}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - agri-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # Python FastAPI - CV 推理微服务 (病害 + 虫害双流水线)
  # 技术栈: Python 3.10 + FastAPI + ONNX Runtime
  # 与 Java 核心业务服务物理隔离, 显存风险不波及业务主线
  # ----------------------------------------------------------
  cv-inference:
    profiles: [app]
    build:
      context: ../inference-service
      dockerfile: ../docker-env/cv-inference/Dockerfile
      args:
        - HTTP_PROXY=${DOCKER_BUILD_PROXY:-}
        - HTTPS_PROXY=${DOCKER_BUILD_PROXY:-}
    container_name: agri-monitor-cv
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DISEASE_MODEL_PATH=/models/disease/best.pt
      - PEST_MODEL_PATH=/models/pest/best.pt
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-agri_redis_2026}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-agri}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-agri_mq_2026}
      - RABBITMQ_VHOST=/agri
      # MinIO
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_ENDPOINT=http://localhost:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-agri_minio_admin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-agri_minio_2026}
      - MINIO_BUCKET=agri-monitor
    volumes:
      - ../models/disease:/models/disease:ro
      - ../models/pest:/models/pest:ro
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - agri-net
    runtime: runc
    # 如果有 GPU, 取消下面注释并删除上面的 runtime: runc
    deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]

  # ----------------------------------------------------------
  # Spring Boot 后端 - 核心业务服务
  # 技术栈: Spring Boot 3.3.x + JDK 17 + LangChain4j + SSE
  # 业务端口: 8080, 管理端口: 8081
  # ----------------------------------------------------------
  backend:
    profiles: [app]
    build:
      context: ..
      dockerfile: docker-env/backend/Dockerfile
    container_name: agri-monitor-backend
    runtime: runc
    restart: always
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      # MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-agriculture_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-agri}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-agri_pwd_2026}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-agri_redis_2026}
      # RabbitMQ
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-agri}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-agri_mq_2026}
      SPRING_RABBITMQ_VIRTUAL_HOST: /agri
      # ElasticSearch
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      # MinIO (S3 兼容)
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-agri_minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-agri_minio_2026}
      MINIO_BUCKET: agri-monitor
      # CV 推理微服务
      CV_INFERENCE_URL: http://cv-inference:8000
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      # LLM API (DeepSeek-V3 / GPT-4o)
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      # SMTP 邮件网关
      SPRING_MAIL_HOST: ${SMTP_HOST:-smtp.qq.com}
      SPRING_MAIL_PORT: ${SMTP_PORT:-587}
      SPRING_MAIL_USERNAME: ${SMTP_USERNAME}
      SPRING_MAIL_PASSWORD: ${SMTP_PASSWORD}
      # JVM 参数
      JAVA_OPTS: -Xms512m -Xmx1024m
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - agri-net

  # ----------------------------------------------------------
  # Vue 3 前端 - 构建产物由 Nginx 托管
  # 技术栈: Vue 3.x + Vite + Element Plus + ECharts
  # ----------------------------------------------------------
  frontend:
    profiles: [app]
    build:
      context: ../frontend
      dockerfile: ../docker-env/frontend/Dockerfile
      args:
        - HTTP_PROXY=${DOCKER_BUILD_PROXY:-}
        - HTTPS_PROXY=${DOCKER_BUILD_PROXY:-}
    container_name: agri-monitor-frontend
    runtime: runc
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - backend
    networks:
      - agri-net

  # ----------------------------------------------------------
  # Nginx - 反向代理与负载均衡
  # 用途: 前端静态资源托管 + API 反向代理 + 跨域解决
  # ----------------------------------------------------------
  nginx:
    profiles: [app]
    image: nginx:1.25-alpine
    container_name: agri-monitor-nginx
    runtime: runc
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - agri-net

  # ----------------------------------------------------------
  # ELK Stack - 日志收集与检索 (可选, 生产环境启用)
  # 用途: 采集 Spring Boot + Python 推理日志, 统一可视化看板
  # ----------------------------------------------------------
  # logstash:
  #   image: logstash:8.13.0
  #   container_name: agri-monitor-logstash
  #   restart: always
  #   volumes:
  #     - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
  #   ports:
  #     - "5044:5044"
  #   environment:
  #     - LS_JAVA_OPTS=-Xms256m -Xmx256m
  #   depends_on:
  #     - elasticsearch
  #   networks:
  #     - agri-net

  # kibana:
  #   image: kibana:8.13.0
  #   container_name: agri-monitor-kibana
  #   restart: always
  #   ports:
  #     - "5601:5601"
  #   environment:
  #     - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
  #   depends_on:
  #     - elasticsearch
  #   networks:
  #     - agri-net

# ============================================================
# 数据卷
# ============================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  es_data:
    driver: local
  minio_data:
    driver: local
  backend_uploads:
    driver: local

# ============================================================
# 网络
# ============================================================
networks:
  agri-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
